    <style>
        /* убираем отступы и делаем canvas на весь экран */
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
        }

        canvas {
            display: block;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1;
        }

        /* ник ввод */
        input {
            padding: 6px;
            font-size: 14px;
        }

        /* музыка игры */
        .music-panel {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 10060;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid rgba(88, 199, 255, 0.35);
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(10,16,28,0.88), rgba(18,34,52,0.72));
            box-shadow: 0 10px 28px rgba(0,0,0,0.35);
            color: #e8eef7;
            font-family: Arial, sans-serif;
            user-select: none;
            backdrop-filter: blur(8px);
        }

        .music-panel button {
            width: 34px;
            height: 30px;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            color: #e8eef7;
            cursor: pointer;
            font-size: 16px;
        }

        .music-panel button:hover {
            background: rgba(88, 199, 255, 0.18);
        }

        .music-panel .music-title {
            max-width: 154px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-size: 12px;
            color: #9fb3c8;
        }

        .music-panel input[type=range] {
            width: 110px;
            padding: 0;
            cursor: pointer;
        }

        .music-panel .music-volume-text {
            min-width: 34px;
            text-align: right;
            font-size: 12px;
            color: #ffc233;
        }

<style>

/* ==========================================================
   LifeCity Clean Auth Window Rewrite
   One DOM layer, HUD-style, no duplicate canvas UI.
   ========================================================== */

#lc-auth-root {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    font-family: "Segoe UI", "Trebuchet MS", Arial, sans-serif;
}

#lc-auth-root.lc-auth-hidden {
    opacity: 0;
    pointer-events: none;
    transition: opacity 700ms ease;
}

.lc-auth-shell {
    pointer-events: auto;
    width: min(920px, calc(100vw - 42px));
    min-height: 560px;
    padding: 22px;
    border-radius: 28px;
    color: rgba(245, 252, 255, 0.98);
    background:
        radial-gradient(circle at 18% 0%, rgba(115, 205, 255, 0.14), transparent 34%),
        radial-gradient(circle at 92% 16%, rgba(90, 170, 255, 0.12), transparent 38%),
        linear-gradient(145deg, rgba(18, 32, 48, 0.965), rgba(10, 20, 34, 0.975));
    border: 1px solid rgba(145, 220, 255, 0.42);
    box-shadow:
        0 28px 86px rgba(0, 0, 0, 0.58),
        inset 0 1px 0 rgba(255, 255, 255, 0.13),
        inset 0 0 42px rgba(70, 180, 255, 0.075),
        0 0 38px rgba(65, 180, 255, 0.16);
    backdrop-filter: blur(7px) saturate(120%);
    -webkit-backdrop-filter: blur(7px) saturate(120%);
    position: relative;
    overflow: hidden;
    animation: lcAuthPanelIn 650ms ease both;
}

.lc-auth-shell::before,
.lc-auth-shell::after {
    content: "";
    position: absolute;
    inset: -30%;
    pointer-events: none;
}

.lc-auth-shell::before {
    background:
        linear-gradient(105deg, transparent 36%, rgba(170, 235, 255, 0.11) 48%, transparent 60%),
        linear-gradient(75deg, transparent 56%, rgba(255, 255, 255, 0.055) 63%, transparent 72%);
    transform: translateX(-42%);
    animation: lcAuthSweep 7s ease-in-out infinite;
}
